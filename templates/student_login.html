<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Login</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <div class="login-page">
      <div class="login-container">
        <div class="login-card">
          <h2>Student Login</h2>
          <p class="subtitle">Smart Attendance Management System</p>

          <!-- UID & PASSWORD LOGIN -->
          <form action="/student-login" method="POST">
            <input
              type="text"
              name="uid"
              placeholder="Enter UID"
              required
              class="login-input"
            />

            <input
              type="password"
              name="password"
              placeholder="Enter Password"
              required
              class="login-input"
            />

            <button type="submit" class="login-btn">LOGIN WITH UID</button>
          </form>

          <div class="divider">OR</div>

          <!-- FACE LOGIN BUTTON -->
          <a href="/student-face-login">
            <button class="login-btn">LOGIN WITH FACE</button>
          </a>

          <p style="margin-top: 15px">
            <a href="/forgot-password" style="color: #1e90ff">
              Forgot Password?
            </a>
          </p>
          <p style="margin-top: 15px; text-align: center">
            New Student?
            <a href="{{ url_for('student_signup') }}" style="color: #4da3ff">
              Create Account
            </a>
          </p>

          <p class="footer-text">Chandigarh University</p>
        </div>
      </div>
    </div>
  </body>
</html>
