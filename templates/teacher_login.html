<!doctype html>
<html>
  <head>
    <title>Teacher Login</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <div class="login-page">
      <div class="login-container">
        <div class="login-card">
          <h2>Teacher Login</h2>
          <p class="subtitle">Attendance Management System</p>

          <form method="POST" action="/teacher-login">
            <input
              type="text"
              name="username"
              placeholder="Username"
              required
            />
            <input
              type="password"
              name="password"
              placeholder="Password"
              required
            />

            <button type="submit" class="login-btn">LOGIN</button>
          </form>

          <!-- 🔐 Forgot Password -->
          <p class="footer-text">
            <a href="/teacher-forgot-password" class="auth-link"
              >Forgot password?</a
            >
          </p>

          <p class="footer-text">
            New Teacher?
            <a href="/teacher-signup" class="auth-link">Create Account</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
