<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Timetable</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <style>
      body {
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        font-family: "Segoe UI", sans-serif;
      }

      .timetable-container {
        max-width: 900px;
        margin: 40px auto;
      }

      .page-title {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .class-card {
        background: #ffffff;
        border-radius: 14px;
        padding: 20px 24px;
        margin-bottom: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        border-left: 6px solid #2563eb;
      }

      .class-left {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .subject {
        font-size: 18px;
        font-weight: 700;
        color: #111827;
      }

      .meta {
        color: #6b7280;
        font-size: 14px;
      }

      .badges {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }

      .day-badge {
        background: #e0e7ff;
        color: #1e40af;
        padding: 5px 14px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
      }

      .time-badge {
        background: #2563eb;
        color: #fff;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
      }

      .empty-box {
        text-align: center;
        padding: 50px;
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
        color: #6b7280;
      }
      .live-badge {
        background: #fee2e2;
        color: #b91c1c;
        padding: 6px 12px;
        border-radius: 999px;
        font-weight: 600;
      }

      .upcoming-badge {
        background: #fff7ed;
        color: #c2410c;
        padding: 6px 12px;
        border-radius: 999px;
        font-weight: 600;
      }
      .class-card.live {
        border-left-color: #dc2626;
        background: linear-gradient(90deg, #fff5f5, #ffffff);
      }
      .class-card.upcoming {
        border-left-color: #f59e0b;
      }
      .class-card.past {
        opacity: 0.5;
      }
      .live {
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
        }
        70% {
          box-shadow: 0 0 0 12px rgba(239, 68, 68, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }
      .class-card:hover {
        transform: translateY(-2px);
        transition: 0.2s ease;
      }
      .attendance-btn {
        background: linear-gradient(135deg, #16a34a, #22c55e);
        color: white;
        padding: 8px 16px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 6px 16px rgba(34, 197, 94, 0.4);
        transition: 0.2s ease;
      }

      .attendance-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 25px rgba(34, 197, 94, 0.6);
      }
    </style>
  </head>

  <body>
    <div class="timetable-container">
      <div class="page-title">Timetable</div>

      {% if timetable %} {% for t in timetable %}
      <div class="class-card">
        <div class="class-left">
          <div class="subject">{{ t.subject }}</div>
          <div class="meta">Class: {{ t.class }}</div>
        </div>

        <div class="badges">
          <div class="day-badge">{{ t.day }}</div>
          <div class="time-badge">{{ t.start_time }} – {{ t.end_time }}</div>

          <!-- 🔥 STATUS PLACEHOLDER (INSIDE BADGES) -->
          <div
            class="status"
            data-day="{{ t.day }}"
            data-start="{{ t.start_time }}"
            data-end="{{ t.end_time }}"
          ></div>

          <!-- 📝 ATTENDANCE BUTTON -->
          <a
            class="attendance-btn"
            href="/teacher/mark-attendance?subject={{ t.subject }}&class={{ t.class }}"
            style="display: none"
          >
            📝 Mark Attendance
          </a>
        </div>
      </div>

      {% endfor %} {% else %}
      <div class="empty-box">📭 No timetable assigned yet</div>
      {% endif %}
    </div>
    <script>
      function updateStatus() {
        document.querySelectorAll(".status").forEach((el) => {
          const card = el.closest(".class-card");
          const btn = card.querySelector(".attendance-btn");

          // reset
          el.className = "status";
          el.innerHTML = "";
          card.classList.remove("live", "upcoming", "past");
          if (btn) btn.style.display = "none";

          const day = el.dataset.day;
          const start = el.dataset.start;
          const end = el.dataset.end;

          const now = new Date();
          const today = now.toLocaleDateString("en-US", { weekday: "long" });

          if (day !== today) return;

          const [sh, sm] = start.split(":").map(Number);
          const [eh, em] = end.split(":").map(Number);

          const startTime = new Date();
          startTime.setHours(sh, sm, 0, 0);

          const endTime = new Date();
          endTime.setHours(eh, em, 0, 0);

          // 🔴 LIVE
          if (now >= startTime && now <= endTime) {
            el.innerHTML = "🔴 Live Now";
            el.classList.add("live-badge");
            card.classList.add("live");
            if (btn) btn.style.display = "inline-block";
          }
          // ⏳ UPCOMING
          else if (now < startTime) {
            const mins = Math.floor((startTime - now) / 60000);
            el.innerHTML = `⏳ Starts in ${mins} min`;
            el.classList.add("upcoming-badge");
            card.classList.add("upcoming");
          }
          // ✅ PAST
          else {
            el.innerHTML = "✅ Completed";
            card.classList.add("past");
          }
        });
      }

      updateStatus();
      setInterval(updateStatus, 60000);
    </script>
  </body>
</html>
