<!doctype html>
<html>
  <head>
    <title>Mark Attendance</title>
    <style>
      body {
        font-family: Arial;
        background: #f4f6fb;
        padding: 30px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
      }
      th,
      td {
        padding: 10px;
        border: 1px solid #ddd;
        text-align: center;
      }
      th {
        background: #2563eb;
        color: white;
      }
      select {
        padding: 4px;
      }
      button {
        margin-top: 20px;
        padding: 10px 24px;
        background: #22c55e;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
      }
    </style>
  </head>

  <body>
    <h2>📝 Mark Attendance</h2>
    {% if error %}
    <div
      style="
        background: #fee2e2;
        color: #991b1b;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 15px;
        font-weight: 600;
      "
    >
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <!-- AUTO FILLED -->
      <label>Subject:</label>
      <input
        type="text"
        name="subject"
        value="{{ selected_subject }}"
        readonly
      />

      <label>Class:</label>
      <input type="text" name="class" value="{{ selected_class }}" readonly />

      <label>Date:</label>
      <input type="date" name="date" value="{{ selected_date }}" readonly />

      <br /><br />

      <table>
        <tr>
          <th>UID</th>
          <th>Name</th>
          <th>Status</th>
        </tr>

        {% for s in students %}
        <tr>
          <td>{{ s.uid }}</td>
          <td>{{ s.name }}</td>
          <td>
            <select name="{{ s.uid }}">
              <option value="Present">Present</option>
              <option value="Absent">Absent</option>
              <option value="Late">Late</option>
            </select>
          </td>
        </tr>
        {% endfor %}
      </table>

      <button type="submit">✅ Save Attendance</button>
    </form>
  </body>
</html>
